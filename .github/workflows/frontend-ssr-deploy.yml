name: Reusable - Frontend SSR Deploy

on:
  workflow_call:
    inputs:
      aws_region:
        required: true
        type: string
      environment:
        required: true
        type: string
      node_version:
        required: false
        type: string
        default: "20"
      build_command:
        required: false
        type: string
        default: "npm run build"
      standalone_dir:
        description: "Diretório com o servidor standalone gerado pelo build (Next.js: .next/standalone)"
        required: false
        type: string
        default: ".next/standalone"
      static_dir:
        description: "Diretório com assets estáticos para enviar ao S3 (Next.js: .next/static)"
        required: false
        type: string
        default: ".next/static"
      static_s3_prefix:
        description: "Prefixo no S3 onde os assets estáticos serão publicados"
        required: false
        type: string
        default: "_next/static"
    secrets:
      AWS_ROLE_ARN:
        required: true
      POSTHOG_KEY:
        description: "PostHog project API key (NEXT_PUBLIC_POSTHOG_KEY). Deixe em branco para desativar analytics."
        required: false
      POSTHOG_HOST:
        description: "Host do PostHog Cloud (ex: https://eu.i.posthog.com). Padrão: US Cloud."
        required: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy-ssr:
    name: "SSR Deploy (${{ inputs.environment }})"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: "npm"
          cache-dependency-path: "app/package-lock.json"

      - name: Instalar dependências
        run: npm ci
        working-directory: app

      - name: Build
        run: ${{ inputs.build_command }}
        working-directory: app
        env:
          # NEXT_PUBLIC_* são embutidos no bundle em build-time pelo Next.js.
          # Sem a chave o PostHogProvider carrega silenciosamente sem enviar eventos.
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}

      - name: Ler parâmetros SSM
        id: ssm
        run: |
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d/ -f2)
          ENV="${{ inputs.environment }}"

          BUCKET=$(aws ssm get-parameter \
            --name "/${REPO_NAME}/${ENV}/s3_assets_bucket" \
            --query "Parameter.Value" --output text)

          FN=$(aws ssm get-parameter \
            --name "/${REPO_NAME}/${ENV}/lambda_function_name" \
            --query "Parameter.Value" --output text)

          CF_ID=$(aws ssm get-parameter \
            --name "/${REPO_NAME}/${ENV}/cloudfront_distribution_id" \
            --query "Parameter.Value" --output text)

          echo "bucket=${BUCKET}" >> "$GITHUB_OUTPUT"
          echo "fn=${FN}"         >> "$GITHUB_OUTPUT"
          echo "cf_id=${CF_ID}"   >> "$GITHUB_OUTPUT"

      # Assets estáticos → S3 (cache imutável, servidos direto pelo CloudFront)
      - name: Sincronizar assets estáticos para S3
        run: |
          aws s3 sync "${{ inputs.static_dir }}" \
            "s3://${{ steps.ssm.outputs.bucket }}/${{ inputs.static_s3_prefix }}" \
            --cache-control "public,max-age=31536000,immutable" \
            --delete
        working-directory: app

      # public/ precisa estar dentro do standalone para o Next.js servidor encontrá-la
      - name: Copiar public/ para o standalone
        run: |
          if [ -d "public" ]; then
            cp -r public "${{ inputs.standalone_dir }}/public"
          fi
        working-directory: app

      # run.sh precisa estar na raiz do zip junto com server.js
      - name: Adicionar run.sh ao standalone
        run: cp run.sh "${{ inputs.standalone_dir }}/run.sh"
        working-directory: app

      - name: Empacotar servidor standalone (zip)
        run: |
          cd "${{ inputs.standalone_dir }}"
          zip -r ../lambda.zip . --quiet
        working-directory: app

      - name: Atualizar código da Lambda
        run: |
          aws lambda update-function-code \
            --function-name "${{ steps.ssm.outputs.fn }}" \
            --zip-file fileb://app/.next/lambda.zip \
            --architectures arm64

      - name: Aguardar atualização da Lambda
        run: |
          aws lambda wait function-updated \
            --function-name "${{ steps.ssm.outputs.fn }}"

      - name: Invalidar cache CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.ssm.outputs.cf_id }}" \
            --paths "/*"
