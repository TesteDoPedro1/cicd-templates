name: Reusable PyTest
on:
  workflow_call:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run Python Tests
        run: |
          cd app
          pip install -r requirements.txt
          python -m pytest
